# Docker Compose for QA Automation and Local RabbitMQ
version: '3.8'

services:
  # Main Web QA Automation Console
  qa-automation-app:
    build: .
    container_name: qa_automation_agent_web
    ports:
      # Exposes the service. You can change the host port (left-side) to any custom port,
      # e.g., "8080:3000" or use the APP_PORT environment variable to override it.
      # To enable remote access, ensure your host firewall allows incoming connections on this port.
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RABBITMQ_URL=amqp://admin:admin_secret@rabbitmq:5672
      - AI_PROVIDER=${AI_PROVIDER}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    volumes:
      - sqlite-data:/app/data
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # RabbitMQ Broker (Single Node)
  rabbitmq:
    image: rabbitmq:3.11-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5674:5672"   # Map host 5674 to container 5672 (avoid conflict)
      - "15674:15672" # Map host 15674 to container 15672
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin_secret
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  sqlite-data:
  rabbitmq-data:
